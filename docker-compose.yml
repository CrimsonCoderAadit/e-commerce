services:
  # ─── Infrastructure ──────────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── Microservices ───────────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
    restart: unless-stopped
    env_file:
      - ./services/auth-service/.env
    ports:
      - "4001:4001"
    depends_on:
      mongo:
        condition: service_healthy

  product-service:
    build:
      context: ./services/product-service
    restart: unless-stopped
    env_file:
      - ./services/product-service/.env
    ports:
      - "4002:4002"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  order-service:
    build:
      context: ./services/order-service
    restart: unless-stopped
    env_file:
      - ./services/order-service/.env
    ports:
      - "4003:4003"
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build:
      context: ./services/notification-service
    restart: unless-stopped
    env_file:
      - ./services/notification-service/.env
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ─── Gateway ─────────────────────────────────────────────────────
  gateway:
    image: nginx:stable-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service
      - product-service
      - order-service
      - frontend

  # ─── Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost/api}

volumes:
  mongo_data:
  redis_data:
  rabbitmq_data:
