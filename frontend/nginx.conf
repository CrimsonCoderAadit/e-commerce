server {
    listen 10000;
    root /usr/share/nginx/html;
    index index.html;

    location /api/auth {
        proxy_pass https://ecommerce-auth-service-3hd3.onrender.com;
        proxy_set_header Host ecommerce-auth-service-3hd3.onrender.com;
        proxy_ssl_server_name on;
    }

    location /api/products {
        proxy_pass https://ecommerce-product-service-ih9z.onrender.com;
        proxy_set_header Host ecommerce-product-service-ih9z.onrender.com;
        proxy_ssl_server_name on;
    }

    location /api/categories {
        proxy_pass https://ecommerce-product-service-ih9z.onrender.com;
        proxy_set_header Host ecommerce-product-service-ih9z.onrender.com;
        proxy_ssl_server_name on;
    }

    location /api/cart {
        proxy_pass https://ecommerce-order-service-3epz.onrender.com;
        proxy_set_header Host ecommerce-order-service-3epz.onrender.com;
        proxy_ssl_server_name on;
    }

    location /api/orders {
        proxy_pass https://ecommerce-order-service-3epz.onrender.com;
        proxy_set_header Host ecommerce-order-service-3epz.onrender.com;
        proxy_ssl_server_name on;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
